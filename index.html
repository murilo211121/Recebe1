<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Gestor de Clientes Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#F5F6F1; --panel:#FFFFFF; --panel-alt:#EFF1EA; --ink:#16241F; --muted:#5B6A62;
    --border:#DEE3D8; --accent:#1F7A5C; --accent-soft:#E4F1EA;
    --amber:#D9A62E; --amber-soft:#FBF0D6; --red:#C1443D; --red-soft:#F7DFDD; --blue:#3E6E8E; --blue-soft:#E4EDF2;
    --topbar-h:56px; --nav-h:64px;
  }
  html.dark{
    --bg:#0E1B17; --panel:#132620; --panel-alt:#1A332B; --ink:#EAF3EE; --muted:#94A89E;
    --border:#25453A; --accent:#3FBF8F; --accent-soft:#183A2E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--ink);
    overscroll-behavior:none; -webkit-user-select:none; user-select:none;}
  input,textarea,select{-webkit-user-select:text; user-select:text; font-family:inherit;}
  h1,h2,h3,h4,.serif{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit; cursor:pointer;}
  #app{max-width:480px; margin:0 auto; position:relative; min-height:100vh; background:var(--bg);}

  /* Topbar */
  #topbar{position:fixed; top:0; left:0; right:0; max-width:480px; margin:0 auto; height:var(--topbar-h);
    padding-top:env(safe-area-inset-top); display:flex; align-items:center; justify-content:space-between;
    padding-left:16px; padding-right:16px; background:var(--panel); border-bottom:1px solid var(--border); z-index:30;}
  #topbar .title{font-size:16px; font-weight:600; font-family:'Fraunces',serif;}
  #topbar .actions{display:flex; gap:4px;}
  .icon-btn{width:36px; height:36px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; border-radius:8px; color:var(--muted);}
  .icon-btn:active{background:var(--panel-alt);}

  /* Content */
  #screen{padding-top:calc(var(--topbar-h) + env(safe-area-inset-top) + 12px);
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
    min-height:100vh;}

  /* Bottom nav */
  #bottomnav{position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom); background:var(--panel); border-top:1px solid var(--border);
    display:flex; z-index:30;}
  .navitem{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:transparent; color:var(--muted); font-size:10px; font-weight:500;}
  .navitem.active{color:var(--accent);}

  /* Generic layout helpers */
  .px{padding-left:16px; padding-right:16px;}
  .stack{display:flex; flex-direction:column; gap:10px;}
  .row{display:flex; align-items:center;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}

  /* Stat ticket */
  .ticket{position:relative; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px 16px; overflow:hidden;}
  .ticket .label{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; display:block; margin-bottom:4px;}
  .ticket .value{font-size:19px; font-weight:600; font-family:'IBM Plex Mono',monospace; line-height:1.1;}
  .ticket .perf{position:absolute; left:0; right:0; bottom:0; height:8px;
    background-image:radial-gradient(circle at 6px 0px, var(--bg) 4px, transparent 4.5px);
    background-size:12px 8px; background-repeat:repeat-x;}

  /* Chips / filters */
  .chiprow{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; -ms-overflow-style:none; scrollbar-width:none;}
  .chiprow::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:500; border:none; background:var(--panel-alt); color:var(--muted); white-space:nowrap;}
  .chip.active{background:var(--accent); color:#fff;}

  /* Search */
  .search{position:relative;}
  .search input{width:100%; padding:10px 12px 10px 38px; border-radius:10px; border:1px solid var(--border); background:var(--panel); color:var(--ink); font-size:14px; outline:none;}
  .search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted);}

  /* Badge */
  .badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .dot{width:6px; height:6px; border-radius:50%;}

  /* Client card */
  .ccard{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:13px 14px;}
  .ccard .top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;}
  .ccard .nome{font-weight:600; font-size:14.5px;}
  .ccard .sub{font-size:11.5px; color:var(--muted); margin-top:2px; display:flex; gap:8px; align-items:center;}
  .ccard .meta{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:var(--muted); margin-top:6px;}
  .ccard .valor{font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--ink); font-size:13.5px;}
  .ccard .actions{display:flex; gap:8px; margin-top:11px;}
  .btn-charge{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; background:var(--accent); color:#fff; border:none; border-radius:9px; padding:10px; font-size:13px; font-weight:600;}
  .btn-more{width:40px; border-radius:9px; border:1px solid var(--border); background:var(--panel); color:var(--muted); display:flex; align-items:center; justify-content:center;}

  /* Buttons general */
  .btn-primary{background:var(--accent); color:#fff; border:none; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px;}
  .btn-secondary{background:var(--panel-alt); color:var(--ink); border:none; border-radius:10px; padding:11px 16px; font-size:13.5px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px;}

  /* FAB */
  #fab{position:fixed; right:16px; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px); max-width:480px;
    width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(0,0,0,.25); z-index:25;}

  /* Sheets / Modals */
  #overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; display:none;}
  #overlay.show{display:block;}
  #sheet{position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto; background:var(--panel);
    border-radius:16px 16px 0 0; max-height:88vh; overflow-y:auto; z-index:51; transform:translateY(100%);
    transition:transform .25s ease; padding-bottom:env(safe-area-inset-bottom);}
  #sheet.show{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--border); border-radius:2px; margin:10px auto 4px;}
  .sheet-head{display:flex; justify-content:space-between; align-items:center; padding:6px 18px 10px;}
  .sheet-head h3{margin:0; font-size:16px;}
  .sheet-body{padding:0 18px 20px;}

  label.field{display:flex; flex-direction:column; gap:4px; font-size:12.5px; color:var(--muted); margin-bottom:10px;}
  label.field input, label.field select, label.field textarea{padding:10px 11px; border-radius:9px; border:1px solid var(--border); background:var(--bg); color:var(--ink); font-size:14px; outline:none;}
  .field2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .action-row{display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--border); font-size:14px;}
  .action-row:last-child{border-bottom:none;}
  .action-row.danger{color:var(--red);}
  .action-row svg{color:inherit;}

  /* Charge receipt */
  .receipt{background:#FCFCF9; color:#20291F; font-family:'IBM Plex Mono',monospace; border:1px solid #E2E2D8; border-radius:10px; padding:18px; margin:0 18px;}
  .receipt .rrow{display:flex; justify-content:space-between; font-size:13px; margin:4px 0;}
  .receipt hr{border:none; border-top:1px dashed #C9C9BC; margin:10px 0;}
  .receipt .msg{white-space:pre-line; font-size:11.5px; line-height:1.5; color:#4A4A3E; margin-top:4px;}

  /* Calendar */
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .calhead{font-size:10px; text-align:center; color:var(--muted); font-weight:600; padding-bottom:4px;}
  .calcell{aspect-ratio:1; border-radius:8px; border:1px solid var(--border); background:var(--panel); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; position:relative; gap:2px;}
  .calcell.today{border-color:var(--accent);}
  .calcell .dots{display:flex; gap:2px;}
  .calcell .dots span{width:5px; height:5px; border-radius:50%;}
  .calcell.empty{border:none; background:transparent;}
  .caldaylist{margin-top:14px;}

  /* Report row */
  .report-row{display:flex; justify-content:space-between; align-items:center; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:13px 14px;}
  .report-row .rt{font-size:13.5px; font-weight:600;}
  .report-row .rs{font-size:11.5px; color:var(--muted); margin-top:2px;}

  section.settings-card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:12px;}
  section.settings-card h4{margin:0 0 10px; font-size:13.5px;}

  .hint{font-size:11.5px; color:var(--muted); display:flex; gap:6px; align-items:flex-start; line-height:1.4;}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);
    background:var(--accent); color:#fff; padding:9px 16px; border-radius:9px; font-size:13px; z-index:60; display:none;}
  .empty-state{text-align:center; padding:40px 20px; color:var(--muted); font-size:13.5px;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title" id="topbarTitle">Dashboard</span>
    <div class="actions" id="topbarActions"></div>
  </div>
  <div id="screen"></div>
  <button id="fab" style="display:none;" onclick="openClientForm()"></button>
  <div id="bottomnav"></div>
</div>
<div id="overlay" onclick="closeSheet()"></div>
<div id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
/* ------------------------------------------------------------------ */
/* ICONS (inline SVG, stroke style)                                    */
/* ------------------------------------------------------------------ */
const ICONS = {
  dashboard:'<path d="M3 3h8v8H3zM13 3h8v5h-8zM13 12h8v9h-8zM3 15h8v6H3z"/>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  chart:'<path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-4"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/>',
  message:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
  check:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10-3-3"/>',
  history:'<path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>',
  trash:'<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
  copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  chevleft:'<path d="m15 18-6-6 6-6"/>',
  chevright:'<path d="m9 18 6-6-6-6"/>',
  moon:'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>',
  sun:'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>',
  alert:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/>',
  receipt:'<path d="M4 2h16v20l-3-2-3 2-3-2-3 2-3-2-1 2Z"/><path d="M8 7h8M8 11h8M8 15h5"/>',
  more:'<circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/>',
};
function icon(name, size=18){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

/* ------------------------------------------------------------------ */
/* HELPERS                                                              */
/* ------------------------------------------------------------------ */
function fmtCurrency(v){ return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleDateString('pt-BR'); }
function daysUntil(dateStr){ const t=new Date(); t.setHours(0,0,0,0); const d=new Date(dateStr); d.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
function billingStatus(c){
  if(c.pago) return 'pago';
  const du=daysUntil(c.expiracao);
  if(du<0) return 'atrasado';
  if(du===0) return 'hoje';
  if(du===1) return 'amanha';
  return 'proximo';
}
const SIGNAL = {
  pago:{fg:'#1F7A5C',bg:'var(--accent-soft)',label:'Pago'},
  hoje:{fg:'#9A7418',bg:'var(--amber-soft)',label:'Vence hoje'},
  amanha:{fg:'#9A7418',bg:'var(--amber-soft)',label:'Vence amanhã'},
  proximo:{fg:'#3E6E8E',bg:'var(--blue-soft)',label:'Em dia'},
  atrasado:{fg:'#B23A33',bg:'var(--red-soft)',label:'Atrasado'},
};
function onlyDigits(s){ return (s||'').replace(/\D/g,''); }
function waNumber(w){ const d=onlyDigits(w); return d.startsWith('55')?d:'55'+d; }
function buildMessage(tpl,c,settings){
  return tpl.replaceAll('{Nome}',c.nome)
    .replaceAll('{Valor}', fmtCurrency(c.valor).replace('R$','').trim())
    .replaceAll('{Plano}',c.plano)
    .replaceAll('{DataVencimento}', fmtDate(c.expiracao))
    .replaceAll('{ChavePIX}', settings.chavePix || '(não configurada)');
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

const STATUS_CONTA=['Ativo','Bloqueado','Suspenso'];
const PLANOS=['Mensal Básico','Mensal Plus','Trimestral','Anual'];
const DEFAULT_TEMPLATE = `Olá, {Nome}.

Passando para lembrar que sua assinatura vence em {DataVencimento}.

Valor da renovação:
R$ {Valor}

Segue minha chave PIX:
{ChavePIX}

Após realizar o pagamento, envie o comprovante por aqui.
Muito obrigado!`;

function seedClients(){
  const today=new Date();
  const addDays=(n)=>{ const d=new Date(today); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
  const rows=[
    ['Marcos Vinícius','marcos.v','Mensal Plus',49.9,0,false],
    ['Fernanda Alencar','fer.alencar','Mensal Básico',29.9,1,false],
    ['João Pedro Souza','jp.souza','Anual',399.0,-3,false],
    ['Camila Duarte','camila.d','Trimestral',119.7,6,false],
    ['Ricardo Nogueira','ricardo.n','Mensal Plus',49.9,-10,false],
    ['Bianca Ferraz','bianca.f','Mensal Básico',29.9,2,true],
    ['Lucas Tavares','lucas.t','Mensal Plus',49.9,15,false],
    ['Patrícia Lima','patricia.l','Trimestral',119.7,-1,false],
    ['Diego Martins','diego.m','Mensal Básico',29.9,20,true],
    ['Aline Cristina','aline.c','Anual',399.0,-25,false],
    ['Rodrigo Passos','rodrigo.p','Mensal Plus',49.9,4,false],
    ['Sabrina Gois','sabrina.g','Mensal Básico',29.9,0,false],
  ];
  return rows.map(([nome,usuario,plano,valor,offset,pago],i)=>({
    id:String(1000+i), usuario, senha:'P@ss'+(1000+i), nome,
    whatsapp:'11 9'+String(80000000+i*137).slice(0,8), plano, valor,
    status:'Ativo', cadastro:addDays(-120-i*3), diaRenovacao:new Date(addDays(offset)).getDate(),
    ultimaRenovacao:addDays(offset-30), expiracao:addDays(offset),
    observacoes:i%4===0?'Cliente antigo, prioridade no atendimento.':'', pago,
    historico:[{data:addDays(-120-i*3),tipo:'Importação',detalhe:'Cliente importado via planilha.'}]
  }));
}

/* ------------------------------------------------------------------ */
/* STATE                                                                */
/* ------------------------------------------------------------------ */
let state = {
  dark:false, view:'dashboard', search:'', quickFilter:'todos',
  clients: seedClients(),
  settings:{ empresaNome:'Minha Empresa', empresaWhatsapp:'', empresaEmail:'', chavePix:'minhaempresa@pix.com', favorecido:'', banco:'', diasAntes:'3', diasDepois:'3', horarioAviso:'09:00' },
  template: DEFAULT_TEMPLATE,
  calCursor: new Date(),
  calSelectedDay: null,
};

function getClient(id){ return state.clients.find(c=>c.id===id); }

/* ------------------------------------------------------------------ */
/* NAV / TOPBAR / SHELL RENDER                                         */
/* ------------------------------------------------------------------ */
const NAV = [
  {id:'dashboard', label:'Painel', icon:'dashboard'},
  {id:'clientes', label:'Clientes', icon:'users'},
  {id:'calendario', label:'Agenda', icon:'calendar'},
  {id:'relatorios', label:'Relatórios', icon:'chart'},
  {id:'config', label:'Ajustes', icon:'settings'},
];
const TITLES = {dashboard:'Dashboard', clientes:'Clientes', calendario:'Calendário', relatorios:'Relatórios', config:'Configurações'};

function setView(v){ state.view=v; render(); window.scrollTo(0,0); }

function renderShell(){
  document.documentElement.classList.toggle('dark', state.dark);
  document.getElementById('topbarTitle').textContent = TITLES[state.view];
  document.getElementById('topbarActions').innerHTML = `
    ${state.view==='clientes' ? `<button class="icon-btn" onclick="openImportSheet()">${icon('upload')}</button>` : ''}
    <button class="icon-btn" onclick="toggleDark()">${icon(state.dark?'sun':'moon')}</button>
  `;
  document.getElementById('bottomnav').innerHTML = NAV.map(n=>`
    <button class="navitem ${state.view===n.id?'active':''}" onclick="setView('${n.id}')">
      ${icon(n.icon,20)}<span>${n.label}</span>
    </button>`).join('');
  document.getElementById('fab').style.display = state.view==='clientes' ? 'flex' : 'none';
  document.getElementById('fab').innerHTML = icon('plus',22);
}

function renderDashboard(){
  const cs=state.clients;
  const bs=cs.map(c=>billingStatus(c));
  const total=cs.length;
  const ativos=cs.filter(c=>c.status==='Ativo').length;
  const bloqueados=cs.filter(c=>c.status==='Bloqueado').length;
  const suspensos=cs.filter(c=>c.status==='Suspenso').length;
  const hoje=bs.filter(s=>s==='hoje').length;
  const amanha=bs.filter(s=>s==='amanha').length;
  const atrasados=bs.filter(s=>s==='atrasado').length;
  const pagos=bs.filter(s=>s==='pago').length;
  const pendentes=total-pagos;
  const receitaPrevista=cs.reduce((s,c)=>s+Number(c.valor||0),0);
  const receitaRecebida=cs.filter((c,i)=>bs[i]==='pago').reduce((s,c)=>s+Number(c.valor||0),0);
  const receitaPendente=receitaPrevista-receitaRecebida;

  const tickets=[
    ['Total de clientes',total,'var(--ink)'],
    ['Ativos',ativos,'var(--accent)'],
    ['Bloqueados',bloqueados,'var(--red)'],
    ['Suspensos',suspensos,'#9A7418'],
    ['Vencendo hoje',hoje,'#9A7418'],
    ['Vencendo amanhã',amanha,'#9A7418'],
    ['Vencidos',atrasados,'var(--red)'],
    ['Pagos',pagos,'var(--accent)'],
    ['Pendentes',pendentes,'var(--ink)'],
    ['Receita prevista',fmtCurrency(receitaPrevista),'var(--ink)'],
    ['Receita recebida',fmtCurrency(receitaRecebida),'var(--accent)'],
    ['Receita pendente',fmtCurrency(receitaPendente),'var(--red)'],
  ];

  const porStatus = STATUS_CONTA.map(s=>({name:s, value:cs.filter(c=>c.status===s).length}));
  const porPlano = PLANOS.map(p=>({name:p.replace('Mensal ',''), value:cs.filter(c=>c.plano===p).length}));
  const maxPlano = Math.max(1, ...porPlano.map(p=>p.value));
  const pieColors=['#1F7A5C','#D9A62E','#C1443D'];
  let acc=0; const totalStatus = porStatus.reduce((s,p)=>s+p.value,0)||1;
  const gradient = porStatus.map((p,i)=>{
    const start=acc/totalStatus*360; acc+=p.value; const end=acc/totalStatus*360;
    return `${pieColors[i]} ${start}deg ${end}deg`;
  }).join(', ');

  return `
    <div class="px stack">
      <div class="grid2">
        ${tickets.map(([label,value,color])=>`
          <div class="ticket">
            <span class="label">${label}</span>
            <span class="value" style="color:${color}">${value}</span>
            <div class="perf"></div>
          </div>`).join('')}
      </div>

      <div class="ticket" style="padding:16px;">
        <h4 style="margin:0 0 12px; font-size:13.5px;">Clientes por status</h4>
        <div class="row" style="gap:18px; justify-content:center;">
          <div style="width:120px;height:120px;border-radius:50%; background:conic-gradient(${gradient});"></div>
          <div class="stack" style="gap:6px;">
            ${porStatus.map((p,i)=>`
              <div class="row" style="gap:6px; font-size:12px; color:var(--muted);">
                <span class="dot" style="background:${pieColors[i]}"></span>${p.name}: <b class="mono" style="color:var(--ink)">${p.value}</b>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="ticket" style="padding:16px;">
        <h4 style="margin:0 0 14px; font-size:13.5px;">Clientes por plano</h4>
        <div class="row" style="align-items:flex-end; justify-content:space-between; height:120px;">
          ${porPlano.map(p=>`
            <div class="stack" style="align-items:center; gap:6px; flex:1;">
              <span class="mono" style="font-size:11px; color:var(--muted);">${p.value}</span>
              <div style="width:26px; border-radius:5px 5px 0 0; background:var(--accent); height:${Math.max(6,p.value/maxPlano*80)}px;"></div>
              <span style="font-size:10px; color:var(--muted); text-align:center;">${p.name}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function filteredClients(){
  return state.clients.filter(c=>{

    if(f==='bloqueados' && c.status!=='Bloqueado') return false;

/* ---- Import sheet ---- */
const COLUMN_ALIASES = {
  id:['id'], usuario:['usuario'], senha:['senha'], nome:['nome'], whatsapp:['whatsapp'],
  plano:['plano'], valor:['valor'], status:['status'], cadastro:['cadastro'],
  diaRenovacao:['dia renovacao'],
  ultimaRenovacao:['ultima renovacao','ultimo renovacao','ultima renovao','ultimo renovao'],
  expiracao:['expiracao'], observacoes:['observacoes','observacao'],
};
function normalizeHeader(s){
  return String(s).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function matchColumn(headers, aliases){
  const normalized = headers.map(normalizeHeader);
  for(const a of aliases){ const idx=normalized.indexOf(a); if(idx!==-1) return headers[idx]; }
  return null;
}
/* Parses dd/mm/yyyy text, Excel date serials, or Date objects safely (avoids
   JS's default US mm/dd/yyyy interpretation of date strings). */
function parseFlexibleDate(v){
  if(!v && v!==0) return '';
  if(v instanceof Date) return isNaN(v) ? '' : v.toISOString().slice(0,10);
  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return '';
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const s = String(v).trim();
  const br = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(br){
    let [,dd,mm,yyyy] = br;
    if(yyyy.length===2) yyyy = '20'+yyyy;
    return `${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  }
  const d = new Date(s);
  return isNaN(d) ? '' : d.toISOString().slice(0,10);
}
/* "Dia 20" / "20" -> 20 */
function parseDiaRenovacao(v){
  const m = String(v||'').match(/\d+/);
  return m ? Number(m[0]) : 1;
}
function openImportSheet(){
  openSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h3>Importar planilha</h3><button class="icon-btn" onclick="closeSheet()">${icon('x')}</button></div>
    <div class="sheet-body" id="importArea">
      <label for="importInput" style="display:flex; flex-direction:column; align-items:center; gap:8px; border:2px dashed var(--border); border-radius:12px; padding:32px 16px; color:var(--muted); font-size:13px; text-align:center;">
        ${icon('upload',22)} Toque para selecionar o arquivo .xlsx ou .xls
      </label>
      <input id="importInput" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleImportFile(this)">
    </div>`);
}
function handleImportFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    let result;
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(rows.length===0){ result={imported:0,updated:0,errors:['Planilha vazia.']}; }
      else{
        const headers = Object.keys(rows[0]);
        const colMap={}; Object.entries(COLUMN_ALIASES).forEach(([k,al])=>colMap[k]=matchColumn(headers,al));
        const parsed=[]; const errors=[]; let semValor=0;
        rows.forEach((row,i)=>{
          const get=(k)=>colMap[k]!==null && colMap[k]!==undefined ? row[colMap[k]] : '';
          const usuario=String(get('usuario')||'').trim();
          const nome=String(get('nome')||'').trim() || usuario;
          if(!nome){ errors.push(`Linha ${i+2}: sem nome e sem usuário para identificar o cliente.`); return; }
          const valor=Number(get('valor'))||0;
          if(!valor) semValor++;
          parsed.push({
            id:String(get('id')||uid()), usuario, senha:String(get('senha')||''),
            nome, whatsapp:String(get('whatsapp')||''), plano:String(get('plano')||PLANOS[0]),
            valor, status:String(get('status')||'Ativo'),
            cadastro:parseFlexibleDate(get('cadastro'))||new Date().toISOString().slice(0,10),
            diaRenovacao:parseDiaRenovacao(get('diaRenovacao')), ultimaRenovacao:parseFlexibleDate(get('ultimaRenovacao')),
            expiracao:parseFlexibleDate(get('expiracao'))||new Date().toISOString().slice(0,10),
            observacoes:String(get('observacoes')||''), pago:false,
            historico:[{data:new Date().toISOString().slice(0,10), tipo:'Importação', detalhe:'Importado via planilha.'}]
          });
        });
        let imported=0, updated=0;
        const byId=new Map(state.clients.map(c=>[c.id,c]));
        const byWa=new Map(state.clients.map(c=>[onlyDigits(c.whatsapp),c]));
        parsed.forEach(row=>{
          const existing = byId.get(row.id) || byWa.get(onlyDigits(row.whatsapp));
          if(existing){
            const idx=state.clients.findIndex(c=>c.id===existing.id);
            state.clients[idx]={...existing, ...row, id:existing.id, historico:[...existing.historico, {data:new Date().toISOString().slice(0,10),tipo:'Importação',detalhe:'Atualizado via planilha.'}]};
            updated++;
          } else { state.clients.push(row); imported++; }
        });
        result={imported,updated,errors,semValor};
      }
    }catch(err){ result={imported:0,updated:0,errors:['Não foi possível ler o arquivo. Verifique se é um .xlsx/.xls válido.'],semValor:0}; }

    document.getElementById('importArea').innerHTML = `
      <div class="grid2" style="grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px;">
        <div style="text-align:center; background:var(--accent-soft); border-radius:10px; padding:10px;">
          <div class="mono" style="font-size:18px; color:var(--accent); font-weight:700;">${result.imported}</div>
          <div style="font-size:10.5px; color:var(--muted);">Importados</div>
        </div>
        <div style="text-align:center; background:var(--panel-alt); border-radius:10px; padding:10px;">
          <div class="mono" style="font-size:18px; font-weight:700;">${result.updated}</div>
          <div style="font-size:10.5px; color:var(--muted);">Atualizados</div>
        </div>
        <div style="text-align:center; background:var(--red-soft); border-radius:10px; padding:10px;">
          <div class="mono" style="font-size:18px; color:var(--red); font-weight:700;">${result.errors.length}</div>
          <div style="font-size:10.5px; color:var(--red);">Erros</div>
        </div>
      </div>
      ${result.errors.length ? `<div style="font-size:11.5px; background:var(--red-soft); color:#8A2A24; border-radius:8px; padding:8px; max-height:120px; overflow-y:auto; margin-bottom:12px;">${result.errors.map(e=>`<div>${esc(e)}</div>`).join('')}</div>` : ''}
      ${result.semValor ? `<div class="hint" style="margin-bottom:12px;">${icon('alert',14)} ${result.semValor} cliente(s) importado(s) sem valor definido — edite manualmente para poder cobrar corretamente.</div>` : ''}
      <button class="btn-primary" style="width:100%;" onclick="closeSheet(); render();">Concluir</button>`;
  };
  reader.readAsArrayBuffer(file);
}

function changeMonth(delta){

function cellColor(c){
  const bs=billingStatus(c);
  if(bs==='pago') return '#1F7A5C';
  if(bs==='hoje'||bs==='amanha') return '#D9A62E';
  if(bs==='atrasado') return '#C1443D';
  return '#3E6E8E';
}
function renderCalendario(){
  const cursor=state.calCursor, year=cursor.getFullYear(), month=cursor.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const byDay={};
  state.clients.forEach(c=>{
    const d=new Date(c.expiracao);
    if(d.getFullYear()===year && d.getMonth()===month){
      byDay[d.getDate()] = byDay[d.getDate()]||[];
      byDay[d.getDate()].push(c);
    }
  });
  const cells=[]; for(let i=0;i<firstDay;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const selectedList = state.calSelectedDay ? (byDay[state.calSelectedDay]||[]) : [];

  return `
    <div class="px stack">
      <div class="row" style="justify-content:space-between;">
        <h3 class="serif" style="margin:0; font-size:16px; text-transform:capitalize;">${cursor.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h3>
        <div class="row" style="gap:4px;">
          <button class="icon-btn" style="background:var(--panel-alt)" onclick="changeMonth(-1)">${icon('chevleft',16)}</button>
          <button class="icon-btn" style="background:var(--panel-alt)" onclick="changeMonth(1)">${icon('chevright',16)}</button>
        </div>
      </div>
      <div class="calgrid">
        ${['D','S','T','Q','Q','S','S'].map(d=>`<div class="calhead">${d}</div>`).join('')}
        ${cells.map(d=>{
          if(!d) return `<div class="calcell empty"></div>`;
          const isToday = d===today.getDate() && month===today.getMonth() && year===today.getFullYear();
          const items = byDay[d]||[];
          return `<div class="calcell ${isToday?'today':''}" onclick="${items.length?`selectCalDay(${d})`:''}">
            <span>${d}</span>
            <div class="dots">${items.slice(0,4).map(c=>`<span style="background:${cellColor(c)}"></span>`).join('')}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="row" style="gap:14px; flex-wrap:wrap; font-size:11px; color:var(--muted); margin-top:4px;">
        ${[['#1F7A5C','Pago'],['#D9A62E','Vence hoje/amanhã'],['#3E6E8E','Em dia'],['#C1443D','Atrasado']].map(([c,l])=>`<span class="row" style="gap:5px;"><span class="dot" style="background:${c}"></span>${l}</span>`).join('')}
      </div>
      ${state.calSelectedDay ? `
        <div class="caldaylist stack">
          <h4 style="margin:0; font-size:13px; color:var(--muted);">Dia ${state.calSelectedDay} — ${selectedList.length} cliente(s)</h4>
          ${selectedList.map(c=>`
            <div class="ccard">
              <div class="top">
                <div class="nome">${esc(c.nome)}</div>
                <span class="badge" style="color:${SIGNAL[billingStatus(c)].fg}; background:${SIGNAL[billingStatus(c)].bg}">${SIGNAL[billingStatus(c)].label}</span>
              </div>
              <div class="meta"><span>${esc(c.plano)}</span><span class="valor">${fmtCurrency(c.valor)}</span></div>
              <div class="actions"><button class="btn-charge" onclick="openChargeSheet('${c.id}')">${icon('message',15)} Cobrar</button></div>
            </div>`).join('')}
        </div>` : ''}
    </div>`;
}

/* ------------------------------------------------------------------ */
/* RELATORIOS                                                           */
/* ------------------------------------------------------------------ */
function exportXlsx(rows, filename){
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Relatório');
  XLSX.writeFile(wb, filename);
}
function exportReport(type){
  const cs=state.clients;
  let data, label;
  if(type==='ativos'){ data=cs.filter(c=>c.status==='Ativo'); label='clientes_ativos'; }
  if(type==='vencidos'){ data=cs.filter(c=>billingStatus(c)==='atrasado'); label='clientes_vencidos'; }
  if(type==='pagos'){ data=cs.filter(c=>billingStatus(c)==='pago'); label='clientes_pagos'; }
  if(type==='pendentes'){ data=cs.filter(c=>billingStatus(c)!=='pago'); label='clientes_pendentes'; }
  const rows = data.map(c=>({Nome:c.nome, Plano:c.plano, Valor:c.valor, Status:c.status, Situação:SIGNAL[billingStatus(c)].label, Expiração:fmtDate(c.expiracao)}));
  exportXlsx(rows, `${label}.xlsx`);
  toast('Relatório exportado');
}
function renderRelatorios(){
  const cs=state.clients;
  const receitaPrevista = cs.reduce((s,c)=>s+Number(c.valor||0),0);
  const receitaRecebida = cs.filter(c=>billingStatus(c)==='pago').reduce((s,c)=>s+Number(c.valor||0),0);
  const reports=[
    ['ativos','Clientes ativos', cs.filter(c=>c.status==='Ativo').length],
    ['vencidos','Clientes vencidos', cs.filter(c=>billingStatus(c)==='atrasado').length],
    ['pagos','Clientes pagos', cs.filter(c=>billingStatus(c)==='pago').length],
    ['pendentes','Clientes pendentes', cs.filter(c=>billingStatus(c)!=='pago').length],
  ];
  return `
    <div class="px stack">
      <div class="grid2">
        <div class="ticket"><span class="label">Receita prevista</span><span class="value">${fmtCurrency(receitaPrevista)}</span><div class="perf"></div></div>
        <div class="ticket"><span class="label">Receita recebida</span><span class="value" style="color:var(--accent)">${fmtCurrency(receitaRecebida)}</span><div class="perf"></div></div>
      </div>
      <div class="ticket"><span class="label">Receita pendente</span><span class="value" style="color:var(--red)">${fmtCurrency(receitaPrevista-receitaRecebida)}</span><div class="perf"></div></div>
      <div class="stack" style="gap:8px; margin-top:6px;">
        ${reports.map(([id,label,count])=>`
          <div class="report-row">
            <div><div class="rt">${label}</div><div class="rs">${count} cliente(s)</div></div>
            <button class="btn-secondary" onclick="exportReport('${id}')">${icon('download',14)} Excel</button>
          </div>`).join('')}
      </div>
      <div class="hint">${icon('alert',14)} Exportação em PDF depende de geração no servidor (PDFKit) — entra quando o backend real for conectado.</div>
    </div>`;
}

/* ------------------------------------------------------------------ */
/* CONFIGURACOES                                                        */
/* ------------------------------------------------------------------ */
function renderConfig(){
  const s=state.settings;
  return `
    <div class="px">
      <section class="settings-card">
        <h4>Dados da empresa</h4>
        <label class="field">Nome da empresa<input id="s_empresaNome" value="${esc(s.empresaNome)}"></label>
        <label class="field">WhatsApp<input id="s_empresaWhatsapp" value="${esc(s.empresaWhatsapp)}"></label>
        <label class="field">E-mail<input id="s_empresaEmail" value="${esc(s.empresaEmail)}"></label>
      </section>
      <section class="settings-card">
        <h4>Financeiro</h4>
        <label class="field">Chave PIX<input id="s_chavePix" value="${esc(s.chavePix)}"></label>
        <label class="field">Nome do favorecido<input id="s_favorecido" value="${esc(s.favorecido)}"></label>
        <label class="field">Banco<input id="s_banco" value="${esc(s.banco)}"></label>
      </section>
      <section class="settings-card">
        <h4>Mensagem de cobrança</h4>
        <label class="field"><textarea id="s_template" rows="7" style="font-family:'IBM Plex Mono',monospace; font-size:12.5px;">${esc(state.template)}</textarea></label>
        <div class="hint" style="margin-bottom:10px;">Use {Nome} {Valor} {Plano} {DataVencimento} {ChavePIX} — substituídos automaticamente ao cobrar.</div>
        <div class="field2">
          <label class="field">Avisar dias antes<input id="s_diasAntes" type="number" value="${esc(s.diasAntes)}"></label>
          <label class="field">Avisar dias depois<input id="s_diasDepois" type="number" value="${esc(s.diasDepois)}"></label>
        </div>
        <label class="field">Horário do aviso<input id="s_horarioAviso" type="time" value="${esc(s.horarioAviso)}"></label>
      </section>
      <button class="btn-primary" style="width:100%;" onclick="saveSettings()">Salvar configurações</button>
    </div>`;
}
function saveSettings(){
  state.settings = {
    empresaNome:document.getElementById('s_empresaNome').value,
    empresaWhatsapp:document.getElementById('s_empresaWhatsapp').value,
    empresaEmail:document.getElementById('s_empresaEmail').value,
    chavePix:document.getElementById('s_chavePix').value,
    favorecido:document.getElementById('s_favorecido').value,
    banco:document.getElementById('s_banco').value,
    diasAntes:document.getElementById('s_diasAntes').value,
    diasDepois:document.getElementById('s_diasDepois').value,
    horarioAviso:document.getElementById('s_horarioAviso').value,
  };
  state.template = document.getElementById('s_template').value;
  toast('Configurações salvas');
}

/* ------------------------------------------------------------------ */
/* SHEET (bottom modal) CONTROL                                        */
/* ------------------------------------------------------------------ */
function openSheet(html){
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
  requestAnimationFrame(()=>document.getElementById('sheet').classList.add('show'));
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

/* ------------------------------------------------------------------ */
/* INIT                                                                 */
/* ------------------------------------------------------------------ */
render();
</script>
</body>
